<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | Uneeco Uganda</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="../index.html">Uneeco<span>.</span></a>
            <button class="navbar-toggler collapsed" id="navToggler" type="button"
                aria-label="Toggle navigation" aria-expanded="false">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center" id="navLinks">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="search-bar" id="searchBar" style="display: none;">
                    <input type="text" class="form-control" placeholder="Search..." id="searchInput">
                </div>
            </div>
            <div class="navbar-icons">
                <button class="search-icon" id="searchBtn"><i class="fas fa-search"></i></button>
                <div class="cart-icon" id="cartBtn">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- PAGE HERO -->
    <header class="hero" style="min-height: 60vh; padding: 140px 0 60px;">
        <div class="hero-blob hero-blob-1"></div>
        <div class="hero-blob hero-blob-2"></div>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-8 hero-content" data-aos="fade-up" data-aos-duration="900">
                    <h1 class="hero-title">Search Results</h1>
                    <p class="hero-subtitle" id="searchQuery">Results for your search</p>
                </div>
                <div class="col-lg-4 hero-image" data-aos="fade-left" data-aos-duration="900">
                    <img src="../assets/images/plates.avif" alt="Search Illustration" class="img-fluid">
                </div>
            </div>
        </div>
    </header>

    <!-- SEARCH RESULTS -->
    <section class="py-5">
        <div class="container">
            <div class="row" id="resultsContainer">
                <!-- Results will be populated here -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="row">
                <div class="col-lg-4">
                    <h5>Uneeco Uganda</h5>
                    <p>Your premium Paper Supply partner.</p>
                </div>
                <div class="col-lg-4">
                    <h5>Quick Links</h5>
                    <ul class="list-unstyled">
                        <li><a href="../index.html">Home</a></li>
                        <li><a href="products.html">Products</a></li>
                        <li><a href="about.html">About</a></li>
                        <li><a href="contact.html">Contact</a></li>
                    </ul>
                </div>
                <div class="col-lg-4">
                    <h5>Contact</h5>
                    <p>Nasser Street, Kampala</p>
                    <p>Phone: +256 XXX XXX XXX</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- MOBILE SIDEBAR NAV -->
    <div class="mobile-sidebar-overlay" id="mobileSidebarOverlay"></div>
    <div class="mobile-sidebar" id="mobileSidebar" aria-hidden="true">
        <div class="mobile-sidebar-header">
            <img src="../assets/images/uneeco_logo.png" alt="Uneeco Logo" class="mobile-sidebar-logo">
            <button class="mobile-sidebar-close" id="mobileSidebarClose" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="mobile-sidebar-nav">
            <a href="../index.html" class="mobile-sidebar-link">Home</a>
            <a href="products.html" class="mobile-sidebar-link">Products</a>
            <a href="about.html" class="mobile-sidebar-link">About Us</a>
            <a href="contact.html" class="mobile-sidebar-link">Contact</a>
        </nav>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/animations.js"></script>
    <script>
        AOS.init();

        const siteIndex = [
            {
                title: 'Home',
                url: '../index.html',
                snippet: 'Uneeco Uganda delivers premium paper products to businesses, companies, and institutions across Uganda — reliably, affordably, and on time.',
                content: 'Uganda Paper Supply Partner, premium paper products, printing paper, office paper, stationery, paper supply',
                image: '../assets/images/plates.avif'
            },
            {
                title: 'Products',
                url: 'products.html',
                snippet: 'A curated range of paper solutions for offices, schools, printers, and more. Includes printing paper, office paper, exercise books, packaging paper, tissue and stationery.',
                content: 'Office Paper, Printing Paper, Exercise Books, Packaging Paper, Tissue & Hygiene, Stationery, digital printing, offset printing, gloss paper, matte paper',
                image: '../assets/images/plates.avif'
            },
            {
                title: 'About',
                url: 'about.html',
                snippet: 'At Uneeco Uganda, our mission is to provide premium paper products and exceptional service to businesses, schools, and institutions across Uganda.',
                content: 'Quality reliability, sustainable paper sourcing, fast delivery, competitive pricing, expert support, trusted paper supplier, eco-friendly practices',
                image: '../assets/images/plates.avif'
            },
            {
                title: 'Contact',
                url: 'contact.html',
                snippet: 'Reach out for quotes, product questions, and orders. Phone +256 000 000 000, email info@uneecouganda.com, Kampala Uganda.',
                content: 'Contact, quote, phone, email, business hours, customer support, Kampala location',
                image: '../assets/images/plates.avif'
            }
        ];

        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q') ? urlParams.get('q').trim() : '';
        const resultsContainer = document.getElementById('resultsContainer');
        const searchQuery = document.getElementById('searchQuery');

        function buildResultCard(item, queryText) {
            const highlight = new RegExp(`(${queryText.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$1')})`, 'gi');
            const titleHtml = item.title.replace(highlight, '<mark>$1</mark>');
            const snippetHtml = item.snippet.replace(highlight, '<mark>$1</mark>');
            return `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card h-100 border-0 shadow-sm">
                        <img src="${item.image}" class="card-img-top" alt="${item.title}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${titleHtml}</h5>
                            <p class="card-text">${snippetHtml}</p>
                            <a href="${item.url}" class="btn btn-outline-primary mt-auto">View Page</a>
                        </div>
                    </div>
                </div>
            `;
        }

        if (query) {
            searchQuery.textContent = `Results for "${query}"`;
            const term = query.toLowerCase();
            const terms = term.split(/\s+/).filter(Boolean);

            const matches = siteIndex.map(item => {
                const text = `${item.title} ${item.snippet} ${item.content}`.toLowerCase();
                let score = 0;
                terms.forEach(word => {
                    if (text.includes(word)) score += 1;
                });
                return { item, score };
            }).filter(result => result.score > 0)
              .sort((a, b) => b.score - a.score);

            if (matches.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <h4 class="mb-3">No results found</h4>
                        <p class="text-muted">Try another search term or browse our main pages.</p>
                    </div>
                `;
            } else {
                resultsContainer.innerHTML = matches.map(match => buildResultCard(match.item, query)).join('');
            }
        } else {
            searchQuery.textContent = 'No search query provided';
            resultsContainer.innerHTML = `
                <div class="col-12 text-center py-5">
                    <h4 class="mb-3">Enter a search term to find pages on the site.</h4>
                    <p class="text-muted">Search for words like "printing", "contact", or "office paper".</p>
                </div>
            `;
        }
    </script>
</body>
</html>
